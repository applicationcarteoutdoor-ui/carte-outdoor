<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <!-- INDISPENSABLE : sans ce meta, Chrome en émulation mobile applique la
       largeur de repli 980 px et l'app s'affiche en mode BUREAU. -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Capture — Carte Outdoor</title>
  <!--
    Harnais de CAPTURE D'ÉCRAN (outil de développement, hors application).

    Charge l'application dans une iframe de la taille d'un téléphone, prépare
    l'état voulu (une « scène »), puis laisse le pilote CDP (capturer.py)
    photographier le résultat. Rien ici n'est pré-caché ni servi aux visiteurs.

    Scènes : carte · fiche-viaferrata · fiche-chateau · fiche-grotte · oracle
             carnet-p1 · carnet-p2 · carnet-p3 · carnet-photo

    Les trois sorties de démonstration (via ferrata, château, grotte) sont
    écrites dans le stockage de CETTE origine : capturer.py lance Chrome avec un
    --user-data-dir temporaire, rien ne reste dans le navigateur de personne.
  -->
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #fff; }
    iframe { display: block; width: 100vw; height: 100vh; border: 0; }
  </style>
</head>
<body>
<script type="module">
import * as storage from "../../js/storage.js";

const scene = new URLSearchParams(location.search).get("scene") || "carte";

/**
 * Les trois lieux de la vidéo : « il clique, il y est ». Trois univers qui
 * n'ont rien à voir entre eux — c'est tout le propos de l'application.
 */
const SPOTS = [
  {
    id: "vf-024",
    photo: "photos/via-ferrata.jpg",
    note: "Le vide sous les pieds, la vallée en dessous. J'ai adoré.",
  },
  {
    id: "ch-0197",
    photo: "photos/chateau.jpg",
    note: "Chambord un dimanche de juillet. Presque personne.",
  },
  {
    id: "grot-0030",
    photo: "photos/grotte.jpg",
    note: "Sous terre, le silence est total. On entend l'eau tomber.",
  },
];

/** Le point mis en avant selon la scène (pour les fiches). */
const POINT_DE_LA_SCENE = {
  "fiche-viaferrata": "vf-024",
  "fiche-chateau": "ch-0197",
  "fiche-grotte": "grot-0030",
};

/** Table rase : ni service worker, ni cache, ni données d'une exécution passée. */
async function nettoyer() {
  const regs = (await navigator.serviceWorker?.getRegistrations?.()) ?? [];
  for (const r of regs) await r.unregister();
  for (const k of await caches.keys()) await caches.delete(k);
  localStorage.clear();
  await new Promise((ok) => {
    const req = indexedDB.deleteDatabase("carte-outdoor");
    req.onsuccess = req.onerror = req.onblocked = () => ok();
  });
}

async function versDataUrl(chemin) {
  const blob = await fetch(chemin).then((r) => r.blob());
  return new Promise((ok) => {
    const fr = new FileReader();
    fr.onload = () => ok(fr.result);
    fr.readAsDataURL(blob);
  });
}

/**
 * Sème les trois sorties du même jour, chacune avec sa photo et sa note.
 * Le carnet les regroupe par (lieu, jour) : une entrée par spot.
 */
async function semerCarnet() {
  for (const [i, spot] of SPOTS.entries()) {
    await storage.setStatus(spot.id, "fait");
    await storage.addSortie(spot.id);
    await storage.addJournalEntry(spot.id, {
      id: `j-video-${i}`,
      date: new Date().toISOString(),
      text: spot.note,
      photo: await versDataUrl(spot.photo),
    });
  }
}

(async () => {
  await nettoyer();
  // Le tuto se lance à la première visite, et le rappel de sauvegarde s'ouvre
  // dès qu'il y a des données : les deux masqueraient la capture.
  await storage.savePrefs({
    tutoVu: true,
    activeThemes: ["via-ferrata", "refuge", "chateau", "grotte"],
    dernierExport: Date.now(),
    dernierRappelSauvegarde: Date.now(),
  });

  if (scene.startsWith("carnet")) await semerCarnet();

  const iframe = document.createElement("iframe");
  iframe.src = "../../index.html";
  document.body.appendChild(iframe);

  iframe.addEventListener("load", () => {
    // Le script de scène s'exécute DANS l'application (même origine, donc
    // autorisé par sa CSP script-src 'self') : il y retrouve les modules vivants.
    const doc = iframe.contentWindow.document;
    const s = doc.createElement("script");
    s.type = "module";
    const point = POINT_DE_LA_SCENE[scene] || SPOTS[0].id;
    s.src = `/dev/video/scene.js?scene=${encodeURIComponent(scene)}&point=${encodeURIComponent(point)}`;
    doc.body.appendChild(s);
  });
})();
</script>
</body>
</html>
